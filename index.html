<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMA Service Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 440px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .logo-text h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
        }

        .logo-text p {
            font-size: 0.875rem;
            color: #64748b;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: white;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
        }

        .options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.25rem 0 1.5rem;
            font-size: 0.875rem;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #475569;
        }

        .forgot {
            color: #2563eb;
            font-weight: 500;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }

        .signup {
            text-align: center;
            font-size: 0.875rem;
            color: #64748b;
        }

        .signup a {
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .footer a {
            color: #64748b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">HMA</div>
                <div class="logo-text">
                    <h2>Haile Manas Academy</h2>
                    <p>Service Learning Portal</p>
                </div>
            </div>

            <h1>Welcome back</h1>

            <div class="social-buttons">
                <button class="social-btn" onclick="alert('Google Sign In')">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="social-btn" onclick="alert('Apple Sign In')">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="black" d="M17.05 20.28c-.98.95-2.05.88-3.08.38-1.09-.52-2.08-.54-3.22 0-1.43.68-2.19.5-3.05-.38C2.79 15.26 3.51 7.6 8.05 7.23c1.34.07 2.29.74 3.08.8.96-.15 1.88-.74 2.94-.69 1.34.07 2.42.62 3.1 1.56-2.83 1.71-2.12 5.37.44 6.59-.45 1.2-1.02 2.38-1.56 2.79zM12.03 7.25c-.23-2.67 2.08-4.06 2.68-4.25.64 2.44-1.84 4.06-2.68 4.25z"/>
                    </svg>
                    Apple
                </button>
            </div>

            <div class="divider">or continue with email</div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot">Forgot password?</a>
            </div>

            <button class="login-btn" onclick="alert('Sign In Successful')">Sign In</button>

            <div class="signup">
                Don't have an account? <a href="#">Sign up</a>
            </div>

            <div class="footer">
                <a href="#">Privacy Policy</a> · <a href="#">Terms</a> · <a href="#">Contact</a>
            </div>
        </div>
    </div>
</body>
</html>
